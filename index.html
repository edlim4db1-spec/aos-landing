<style>
/* ========================================
   RESET & TOKENS
   ======================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font-display: 'Cabinet Grotesk', -apple-system, sans-serif;
  --font-body: 'Satoshi', -apple-system, sans-serif;

  --bg: #08090D;
  --surface: #0F1015;
  --surface-2: #12131A;
  --surface-3: #181920;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);

  --text: #E8E8E8;
  --text-muted: #888;
  --text-faint: #555;

  --accent: #00D4AA;
  --accent-hover: #00E8BB;
  --accent-dim: rgba(0,212,170,0.1);
  --accent-glow: rgba(0,212,170,0.15);
  --warm: #FFB547;
  --warm-dim: rgba(255,181,71,0.1);

  --ease: cubic-bezier(0.16,1,0.3,1);
  --transition: 180ms cubic-bezier(0.16,1,0.3,1);
}

html {
  scroll-behavior: smooth;
  scroll-padding-top: 5rem;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: inherit; text-decoration: none; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
ul { list-style: none; }
img, svg { display: block; max-width: 100%; }
h1,h2,h3,h4 { font-family: var(--font-display); line-height: 1.1; text-wrap: balance; }
p, li { text-wrap: pretty; }

::selection { background: rgba(0,212,170,0.25); color: var(--text); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ========================================
   LAYOUT
   ======================================== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem;
}
@media (min-width: 768px) { .container { padding: 0 2rem; } }

.section { padding: clamp(4rem, 8vw, 8rem) 0; }

/* ========================================
   REVEAL ANIMATIONS
   ======================================== */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* ========================================
   CURSOR GLOW
   ======================================== */
.cursor-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(circle, rgba(0,212,170,0.04) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
  opacity: 0;
}
.cursor-glow.active { opacity: 1; }

/* ========================================
   NAVIGATION
   ======================================== */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1rem 0;
  transition: background 0.3s, backdrop-filter 0.3s, padding 0.3s;
}
.nav.scrolled {
  background: rgba(8,9,13,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 0;
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem;
}
@media (min-width: 768px) { .nav-inner { padding: 0 2rem; } }

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.nav-logo svg { width: 36px; height: 36px; }
.nav-logo-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.25rem;
  letter-spacing: -0.02em;
}

.nav-links {
  display: none;
  gap: 2rem;
  align-items: center;
}
@media (min-width: 768px) { .nav-links { display: flex; } }

.nav-links a {
  font-size: 0.9375rem;
  font-weight: 500;
  color: var(--text-muted);
  transition: color var(--transition);
}
.nav-links a:hover { color: var(--text); }

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1.25rem;
  background: var(--accent);
  color: var(--bg);
  font-size: 0.9375rem;
  font-weight: 700;
  border-radius: 999px;
  transition: all var(--transition);
}
.nav-cta:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,212,170,0.3);
}

/* Mobile menu */
.nav-mobile-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px; height: 44px;
  color: var(--text);
}
@media (min-width: 768px) { .nav-mobile-toggle { display: none; } }

.mobile-menu {
  position: fixed;
  inset: 0;
  background: rgba(8,9,13,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 99;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s var(--ease);
}
.mobile-menu.open { opacity: 1; pointer-events: auto; }
.mobile-menu a {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
}
.mobile-menu-close {
  position: absolute;
  top: 1rem; right: 1.5rem;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
}

/* ========================================
   BUTTONS
   ======================================== */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.875rem 2rem;
  background: var(--accent);
  color: var(--bg);
  font-size: 1rem;
  font-weight: 700;
  font-family: var(--font-body);
  border-radius: 999px;
  border: none;
  transition: all var(--transition);
}
.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,212,170,0.3);
}
.btn-primary:active { transform: translateY(0); }

.btn-primary.glow {
  box-shadow: 0 0 20px rgba(0,212,170,0.2), 0 0 60px rgba(0,212,170,0.08);
  animation: btn-glow 3s ease-in-out infinite;
}
@keyframes btn-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(0,212,170,0.2), 0 0 60px rgba(0,212,170,0.08); }
  50% { box-shadow: 0 0 28px rgba(0,212,170,0.35), 0 0 80px rgba(0,212,170,0.12); }
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.875rem 2rem;
  background: transparent;
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font-body);
  border-radius: 999px;
  border: 1px solid var(--border-hover);
  transition: all var(--transition);
}
.btn-secondary:hover {
  border-color: rgba(255,255,255,0.24);
  background: rgba(255,255,255,0.04);
  transform: translateY(-1px);
}

/* ========================================
   HERO
   ======================================== */
.hero {
  position: relative;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8rem 1.5rem 4rem;
  overflow: hidden;
  text-align: center;
}

</script>
</body>
